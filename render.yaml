## Render Infrastructure-as-Code
## Deploy with: https://render.com/deploy
## Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: data-analyst-api
    runtime: python
    region: oregon
    plan: free           # upgrade to "starter" ($7/mo) for always-on
    buildCommand: pip install -r backend/requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: GROQ_API_KEY
        sync: false            # set manually in Render dashboard → Secret
      - key: DATABASE_URL
        fromDatabase:
          name: data-analyst-db
          property: connectionString
      - key: REDIS_URL
        sync: false            # use Upstash free Redis — set URL manually
      - key: ALLOWED_ORIGINS
        sync: false            # set to your Vercel URL, e.g. https://your-app.vercel.app
      - key: LANGSMITH_TRACING
        value: "false"

databases:
  - name: data-analyst-db
    databaseName: sales_db
    user: analyst
    plan: free               # 1 GB storage, 97 hours/month on free tier

## ── Notes ────────────────────────────────────────────────────────────────────
## Redis: Render's free Redis is deprecated. Use Upstash (https://upstash.com)
##   1. Create a free Redis database on Upstash
##   2. Copy the Redis URL (rediss://... format)
##   3. Set it as REDIS_URL in the Render dashboard for this service
##
## Frontend: Deploy the frontend separately on Vercel.
##   Set API_URL = https://<your-render-service>.onrender.com on Vercel.
